# ============================================================
# Lapwing 主配置文件（TOML 为主配置源）
# 所有非敏感配置在此集中管理，按模块分组。
# 敏感凭据（API keys/tokens）和环境特定覆盖放 config/.env。
# 环境变量可覆盖此文件中的任何值（见 _ENV_MAP）。
# ============================================================

[proxy]
search_url = ""
server = "http://192.168.0.202:7890"
default_strategy = "proxy"
persist_interval_seconds = 300

[qq]
enabled = true
ws_url = "ws://127.0.0.1:3001"
# self_id, kevin_id, access_token 从 .env 读取
group_ids = []
group_context_size = 30
group_cooldown = 60
group_interest_keywords = []

[llm]
model = "minimax-m2.7"
provider = "volcengine"

[llm.chat]
model = "minimax-m2.7"
provider = "volcengine"

[llm.tool]
model = ""
provider = ""

[llm.heartbeat]
provider = "nvidia"

[nim]
base_url = "https://integrate.api.nvidia.com/v1"
model = "moonshotai/kimi-k2-instruct"
provider = ""

[consciousness]
default_interval = 600
min_interval = 120
max_interval = 14400
after_chat_interval = 120
conversation_end_delay = 300

[message]
buffer_seconds = 4.0

[memory]
episodic_extract_enabled = true
episodic_extract_min_turns = 3
episodic_extract_window_size = 20
semantic_distill_enabled = true
semantic_distill_episodes_window = 20
semantic_distill_dedup_threshold = 0.85
working_set_top_k = 10

[memory.wiki]
# Phase 1: read-only injection of wiki pages into working set context.
# write_enabled stays false until Phase 2 has been validated.
enabled = true
context_enabled = true
write_enabled = false
gate_enabled = true
lint_enabled = false
wiki_dir = "data/memory/wiki"
context_budget_ratio = 0.40

[shell]
enabled = true
# Sudo is denied by default. Enabling it requires both flipping this flag
# and configuring sudoers — the shell executor blocks `sudo` regardless
# of the calling profile when this is false (see shell_executor._blocked_reason).
allow_sudo = false
timeout = 30
default_cwd = "/home/kevin/lapwing"
max_output_chars = 4000
backend = "local"
workspace_owner = "kevin"
docker_image = "lapwing-sandbox:latest"
docker_workspace = "/workspace"

[task]
max_tool_rounds = 32
no_action_budget = 3
error_burst_threshold = 3

[intent_router]
enabled = true
session_ttl_seconds = 300

[slo]
shell_p95_ms = 2000
web_p95_ms = 5000
long_command_cutoff_ms = 10000
event_start_to_ui_p95_ms = 200
event_update_throttle_ms = 500
latency_window_size = 200
latency_min_samples = 20

[loop_detection]
enabled = true
blocking = false
history_size = 30
warning_threshold = 10
critical_threshold = 20
global_circuit_breaker_threshold = 30
detector_generic_repeat = true
detector_ping_pong = true
detector_known_poll_no_progress = true

[search]
max_results = 5
provider = "auto"
cache_ttl_seconds = 300
chat_web_tools_enabled = true
tavily_search_depth = "basic"
tavily_country = "china"
web_fetch_max_chars = 8000

[browse]
enabled = true
interval_hours = 2
sources = ["hackernews", "reddit/technology", "reddit/science"]

[api]
host = "127.0.0.1"
port = 8765
session_cookie_name = "lapwing_session"
session_ttl_seconds = 43200
allowed_origins = [
    "http://localhost:1420",
    "http://127.0.0.1:1420",
    "http://127.0.0.1:8765",
    "tauri://localhost",
    "http://tauri.localhost",
    "https://tauri.localhost",
]

[browser]
enabled = false
headless = true
max_tabs = 8
page_text_max_chars = 4000
navigation_timeout_ms = 30000
action_timeout_ms = 10000
screenshot_retain_days = 7
viewport_width = 1280
viewport_height = 720
locale = "zh-CN"
timezone = "Asia/Shanghai"
max_element_count = 50
wait_after_action_ms = 1000
url_blacklist = []
url_whitelist = []
block_internal_network = true
sensitive_action_words = [
    "delete", "remove", "pay", "purchase", "buy", "submit order",
    "删除", "移除", "支付", "购买", "确认订单", "提交订单",
]

[browser.vision]
enabled = true
slot = "browser_vision"
max_description_chars = 500
cache_ttl_seconds = 30
img_threshold = 5
alt_ratio_threshold = 0.3

[browser.minimax_vlm]
enabled = false
host = "https://api.minimaxi.com"

[auth]
owner_ids = []
trusted_ids = []
refresh_skew_seconds = 300

[desktop]
default_owner = false
ws_chat_id_prefix = "desktop"

[skill]
enabled = false
sandbox_image = "lapwing-sandbox"
sandbox_timeout = 30

[agents]
# Phase 6C: require an approved AgentCandidate with sufficient evidence
# before saving a capability-backed persistent dynamic agent.
# Default false — existing save_agent behavior is unchanged.
require_candidate_approval_for_persistence = false
# Phase 6D: expose operator-only tools for managing AgentCandidate objects.
# Default false — candidate tools are absent from the tool registry.
candidate_tools_enabled = false
# Phase 6D: optional evidence staleness threshold in days.
# When set, high/medium evidence older than this is denied by the save gate.
# Default 90 (unset = no enforcement).
candidate_evidence_max_age_days = 90

[agent_team]
enabled = true

[agent_team.researcher]
max_rounds = 15
timeout_seconds = 300
max_tokens = 40000

[agent_team.coder]
max_rounds = 20
timeout_seconds = 600
max_tokens = 50000

[agent_team.dynamic]
enabled = true
max_persistent_agents = 10
max_session_agents = 5
session_cleanup_interval_seconds = 300

[budget]
max_llm_calls = 50
max_tool_calls = 100
max_total_tokens = 200000
max_wall_time_seconds = 600
max_delegation_depth = 1

[whisper]
base_url = "https://api.openai.com/v1"
model = "whisper-1"

[codex]
auth_authorize_url = "https://auth.openai.com/oauth/authorize"
auth_token_url = "https://auth.openai.com/oauth/token"
auth_client_id = "app_EMoamEEZ73f0CkXaXp7hrann"
auth_redirect_host = "localhost"
auth_redirect_port = 1455
auth_redirect_path = "/auth/callback"
fallback_model = "gpt-5.3-codex"
runtime_base_url = "https://chatgpt.com/backend-api/codex"
runtime_client_version = "0.116.0-alpha.10"
runtime_timeout_seconds = 60

[focus]
enabled = true
timeout_seconds = 1800
rapid_gap_seconds = 60
min_entries_to_keep = 4
max_dormant = 10
dormant_ttl_hours = 24
closed_ttl_hours = 72
reactivate_threshold = 0.75

[inner_tick]
# Runtime budget for autonomous self-initiated thinking pulses. Distinct
# from [consciousness] which controls cadence — these knobs cap how much
# *one* tick may spend before yielding.
enabled = true
base_interval_seconds = 600
min_interval_seconds = 300
max_interval_seconds = 14400
timeout_seconds = 120
max_tool_rounds = 3
no_action_budget = 2
error_burst_threshold = 2

[proactive_messages]
enabled = true
max_per_day = 3
min_minutes_between = 90
quiet_hours_start = "23:00"
quiet_hours_end = "08:00"
allow_urgent_bypass = true
urgent_bypass_categories = ["reminder_due", "safety", "explicit_commitment"]

[log]
level = "INFO"

[sandbox]
docker_image = "lapwing-sandbox:latest"
network = "lapwing-sandbox"

[sandbox.strict]
memory_mb = 256
cpus = 0.5
timeout = 30

[sandbox.standard]
memory_mb = 512
cpus = 1.0
timeout = 60

[sandbox.privileged]
memory_mb = 1024
cpus = 2.0
timeout = 300

[identity]
parser_enabled = true
store_enabled = true
retriever_enabled = true
injector_enabled = false
gate_enabled = false
identity_system_killswitch = false

[capabilities]
# Phase 0/1: All flags disabled. No runtime behavior is wired yet.
# Phase 2+ will gate capability retrieval, curation, and auto-drafting
# behind these flags.
# Phase 3C: lifecycle_tools_enabled gates evaluate/plan/transition tools.
# Requires capabilities.enabled=true. Defaults to false (operator-only).
enabled = true
retrieval_enabled = true
curator_enabled = false
curator_dry_run_enabled = true
auto_draft_enabled = false
execution_summary_enabled = true
lifecycle_tools_enabled = false
# Phase 7A: external package import into quarantine only (operator-only)
external_import_enabled = false
# Phase 7C: quarantine testing transition requests (operator-only bridge)
quarantine_transition_requests_enabled = false
# Phase 7D-A: quarantine activation planning (planner-only, no activation)
quarantine_activation_planning_enabled = false
# Phase 8B-3: trust root operator tools (operator-only metadata management)
trust_root_tools_enabled = false
# Maintenance C: repair queue operator tools (operator-only)
repair_queue_tools_enabled = false
# Phase 8C-1: stable promotion trust gate (testing -> stable provenance/trust/integrity checks)
stable_promotion_trust_gate_enabled = false
data_dir = "data/capabilities"
index_db_path = "data/capabilities/capability_index.sqlite"
